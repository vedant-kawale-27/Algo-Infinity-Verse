    <section id="profile" class="section profile-section">
      <div class="container">
        <h2 class="section-title">
          <span class="title-icon">👤</span>
          Profile
        </h2>
        <div class="profile-container">
          <div class="profile-header">
            <div class="profile-avatar">
              <span class="avatar-icon">L</span>
            </div>
            <div class="profile-info">
              <h3 id="profileSectionName">Learner</h3>
              <p class="profile-level" id="profileLevelSection">
                Level 1 - Beginner
              </p>
              <p class="profile-join">
                Joined: <span id="joinDateSection">Today</span>
              </p>
              <p class="profile-bio empty-state" id="profileBio">No bio yet. Click edit to add one!</p>
            </div>
            <button type="button"
              class="profile-edit-btn"
              id="profileSectionEditBtn"
              title="Edit Profile"
              aria-label="Edit Profile"
            >
              <i class="fas fa-pen"></i>
            </button>
          </div>
          <div class="profile-stats">
            <div class="profile-stat big-box">
              <span class="profile-stat-value" id="profileTotalXPSection"
                >0</span
              >
              <span class="profile-stat-label">Total XP</span>
            </div>
            <div class="profile-stat big-box">
              <span class="profile-stat-value" id="profileProblemsSection"
                >0</span
              >
              <span class="profile-stat-label">Problems</span>
            </div>
            <div class="profile-stat big-box">
              <span class="profile-stat-value" id="profileSectionStreak"
                >0</span
              >
              <span class="profile-stat-label">Day Streak</span>
            </div>
            <div class="profile-stat big-box">
              <span class="profile-stat-value" id="profileSectionFreezes"
                >0</span
              >
              <span class="profile-stat-label">Freezes</span>
            </div>
            <div class="profile-stat big-box">
              <span class="profile-stat-value" id="profileBadgesSection"
                >0</span
              >
              <span class="profile-stat-label">Badges</span>
            </div>
          </div>
          <div class="profile-progress">
            <div class="progress-bar-container big-box">
              <div class="progress-label">
                <span>Level Progress</span>
                <span id="profileLevelProgressSection">0%</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" id="profileProgressBarSection"></div>
              </div>
            </div>
            <div class="account-actions">
              <button type="button" id="changePasswordBtn" class="btn btn-secondary">
                <i class="fas fa-key"></i> Change Password
              </button>
              <button type="button" id="deactivateAccountBtn" class="btn btn-danger">
                <i class="fas fa-user-slash"></i> Deactivate Account
              </button>
              <button type="button" id="deleteAccountBtn" class="btn btn-danger">
                <i class="fas fa-trash"></i> Delete Account
              </button>
            </div>
          </div>
        </div>

<!-- Skills Mastered -->
<div class="profile-skills-mastery big-box" style="margin-top: 1.5rem; padding: 1.5rem; text-align: left; border-radius: var(--border-radius); border: 1px solid var(--glass-border); background: var(--dark-card);">
  <h4 style="margin: 0 0 1rem 0; font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--text-light); display: flex; align-items: center; gap: 0.5rem;">
    <span>🧠</span> Skills Mastered
  </h4>
  <div id="skillsMasteryGrid"></div>
</div>
        <div class="profile-leaderboard big-box" style="margin-top: 1.5rem; padding: 1.5rem; text-align: left; border-radius: var(--border-radius); border: 1px solid var(--glass-border); background: var(--dark-card);">
          <h4 style="margin: 0 0 1rem 0; font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--text-light); display: flex; align-items: center; gap: 0.5rem;">
            <span>🗂️</span> Bookmark Collections
          </h4>
          <div id="bookmarkCollectionsPanel" class="bookmark-collections-profile"></div>
        </div>

      </div>
    </section>
