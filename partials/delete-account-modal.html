<div class="modal" id="deleteAccountModal" role="dialog" aria-modal="true" aria-labelledby="deleteAccountTitle">
  <div class="modal-content delete-account-modal-content">
    <button type="button" class="modal-close" id="deleteAccountModalClose" aria-label="Close">&times;</button>

    <div class="delete-account-icon">
      <div class="delete-account-icon-ring">
        <i class="fas fa-trash"></i>
      </div>
    </div>

    <h2 class="delete-account-title" id="deleteAccountTitle">Delete Account</h2>

    <p class="delete-account-message">
      This will permanently delete your account and all associated data.
      <strong>This action cannot be undone.</strong>
    </p>

    <div class="delete-account-form">
      <div class="password-field">
        <label for="deleteAccountPassword">Confirm your password</label>
        <div class="password-input-wrapper">
          <input
            type="password"
            id="deleteAccountPassword"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button type="button" class="password-toggle" data-target="deleteAccountPassword">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <small id="deleteAccountPasswordError" class="field-error" role="alert"></small>
      </div>
    </div>

    <div class="delete-account-actions">
      <button type="button" class="delete-account-btn delete-account-btn--cancel" id="deleteAccountCancel">Cancel</button>
      <button type="button" class="delete-account-btn delete-account-btn--danger" id="deleteAccountConfirm">Delete Account</button>
    </div>
  </div>
</div>
