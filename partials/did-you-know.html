    <div class="facts-card">

          <h3>Did You Know?</h3>

        <button type="button" onclick="showNextFact()" class="facts-btn">
          Next Fact →
        </button>
      </div>
      <div class="facts-content">
        <p id="factText" class="fact-text" aria-live="polite" aria-atomic="true">

        </div>
      </div>
    </div>
