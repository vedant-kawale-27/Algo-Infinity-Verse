    <!-- Change Password Modal -->
    <div
      class="modal"
      id="changePasswordModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="changePasswordTitle"
    >
      <div class="modal-content cpw-modal-content">
        <!-- Close button -->
        <button
          type="button"
          class="modal-close cpw-modal-close"
          id="changePasswordClose"
          aria-label="Close change password modal"
        >
          &times;
        </button>

        <!-- Icon ring -->
        <div class="cpw-icon">
          <div class="cpw-icon-ring">
            <i class="fas fa-shield-halved cpw-shield"></i>
          </div>
        </div>

        <!-- Title & subtitle -->
        <h2 class="cpw-title" id="changePasswordTitle">Change Password</h2>
        <p class="cpw-subtitle">
          Set a strong, unique password to secure your account.
        </p>

        <!-- Guest notice (hidden by default) -->
        <div class="cpw-guest-notice" id="cpwGuestNotice" hidden>
          <i class="fas fa-user-astronaut"></i>
          <span>You are browsing as a guest. <a href="/login">Sign in</a> to manage your password.</span>
        </div>

        <!-- Message area -->
        <div
          id="changePasswordMessage"
          class="cpw-message"
          role="alert"
          hidden
        ></div>

        <!-- Form body -->
        <div class="cpw-form" id="cpwFormBody">

          <!-- Current Password -->
          <div class="cpw-field">
            <label for="currentPassword">Current Password</label>
            <div class="cpw-input-wrap">
              <input
                type="password"
                id="currentPassword"
                class="cpw-input"
                placeholder="Enter current password"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="cpw-toggle"
                data-target="currentPassword"
                aria-label="Toggle current password visibility"
              >
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <!-- New Password -->
          <div class="cpw-field">
            <label for="newPassword">New Password</label>
            <div class="cpw-input-wrap">
              <input
                type="password"
                id="newPassword"
                class="cpw-input"
                placeholder="Create a strong password"
                autocomplete="new-password"
                required
              />
              <button
                type="button"
                class="cpw-toggle"
                data-target="newPassword"
                aria-label="Toggle new password visibility"
              >
                <i class="fas fa-eye"></i>
              </button>
            </div>

            <!-- Strength bar -->
            <div class="cpw-strength-track">
              <div class="cpw-strength-bar" id="passwordStrengthBar"></div>
            </div>
            <span class="cpw-strength-label" id="passwordStrengthText">Password strength</span>

            <!-- Rules checklist -->
            <ul class="cpw-rules" id="passwordRules">
              <li class="cpw-rule" id="ruleLength">
                <span class="cpw-rule-icon"><i class="fas fa-circle"></i></span>
                Minimum 8 characters
              </li>
              <li class="cpw-rule" id="ruleUpper">
                <span class="cpw-rule-icon"><i class="fas fa-circle"></i></span>
                One uppercase letter
              </li>
              <li class="cpw-rule" id="ruleLower">
                <span class="cpw-rule-icon"><i class="fas fa-circle"></i></span>
                One lowercase letter
              </li>
              <li class="cpw-rule" id="ruleNumber">
                <span class="cpw-rule-icon"><i class="fas fa-circle"></i></span>
                One number
              </li>
              <li class="cpw-rule" id="ruleSpecial">
                <span class="cpw-rule-icon"><i class="fas fa-circle"></i></span>
                One special character
              </li>
            </ul>
          </div>

          <!-- Confirm New Password -->
          <div class="cpw-field">
            <label for="confirmNewPassword">Confirm New Password</label>
            <div class="cpw-input-wrap">
              <input
                type="password"
                id="confirmNewPassword"
                class="cpw-input"
                placeholder="Confirm new password"
                autocomplete="new-password"
                required
              />
              <button
                type="button"
                class="cpw-toggle"
                data-target="confirmNewPassword"
                aria-label="Toggle confirm password visibility"
              >
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <small id="confirmPasswordError" class="cpw-field-error"></small>
          </div>
        </div>

        <!-- Footer actions -->
        <div class="cpw-footer">
          <button type="button" class="cpw-btn cpw-btn--outline" id="cancelPasswordChange">
            Cancel
          </button>
          <button type="button" class="cpw-btn cpw-btn--primary" id="savePasswordBtn">
            <i class="fas fa-key"></i>
            <span>Change Password</span>
          </button>
        </div>
      </div>
    </div>
