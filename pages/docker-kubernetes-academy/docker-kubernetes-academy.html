<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Docker & K8s Academy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="docker-kubernetes-academy.css" />
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">
    <!-- Mobile Sidebar Toggle -->
    <button
      id="mobile-menu-btn"
      class="md:hidden fixed top-4 right-4 z-50 p-2 bg-blue-600 text-white rounded shadow-lg"
    >
      <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Navigation -->
    <aside
      id="sidebar"
      class="w-72 bg-white border-r border-gray-200 h-full flex flex-col transition-transform duration-300 absolute md:relative z-40 -translate-x-full md:translate-x-0"
    >
      <div class="p-4 border-b border-gray-200 bg-blue-50 flex items-center gap-3">
        <i class="fab fa-docker text-blue-600 text-3xl"></i>
        <h1 class="font-bold text-lg text-blue-900 leading-tight">Docker & K8s Hub</h1>
      </div>

      <!-- Progress Bar -->
      <div class="p-4 border-b border-gray-200">
        <div class="flex justify-between text-xs mb-1 font-semibold text-gray-500">
          <span>Progress</span>
          <span id="progress-text">0%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div
            id="progress-bar"
            class="bg-blue-600 h-2 rounded-full transition-all duration-500"
            style="width: 0%"
          ></div>
        </div>
      </div>

      <div id="sidebar-content" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
        <!-- JS will inject curriculum navigation here -->
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 h-full flex flex-col relative w-full">
      <!-- Tabs Header -->
      <header
        class="bg-white border-b border-gray-200 px-6 py-4 flex space-x-4 shadow-sm z-10 overflow-x-auto"
      >
        <button
          class="tab-btn active px-4 py-2 font-medium rounded-t-lg border-b-2 border-blue-600 text-blue-700 transition-colors whitespace-nowrap"
          data-tab="lesson"
        >
          <i class="fas fa-book-open mr-2"></i>Lesson Viewer
        </button>
        <button
          class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-blue-600 transition-colors whitespace-nowrap"
          data-tab="simulator"
        >
          <i class="fas fa-terminal mr-2"></i>CLI Simulator
        </button>
        <button
          class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-blue-600 transition-colors whitespace-nowrap"
          data-tab="quiz"
        >
          <i class="fas fa-tasks mr-2"></i>Knowledge Check
        </button>
        <div class="ml-auto">
          <a
            href="../../index.html"
            class="text-sm font-bold text-gray-600 hover:text-gray-900 transition-colors"
          >
            <i class="fas fa-home"></i> Home
          </a>
        </div>
      </header>

      <!-- Tab Contents -->
      <div class="flex-1 overflow-y-auto relative bg-gray-50 custom-scrollbar">
        <!-- Lesson Tab -->
        <div id="lesson-tab" class="tab-content active p-6 md:p-10 max-w-4xl mx-auto w-full">
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8">
            <h2 id="lesson-title" class="text-3xl font-bold mb-6 text-gray-800">Welcome</h2>
            <div id="lesson-body" class="prose max-w-none text-gray-600 leading-relaxed space-y-4">
              Select a lesson from the sidebar.
            </div>
            <div class="mt-8 flex justify-between items-center border-t border-gray-100 pt-6">
              <button
                id="prev-btn"
                class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors font-medium invisible"
              >
                <i class="fas fa-arrow-left mr-2"></i>Previous
              </button>
              <button
                id="mark-complete-btn"
                class="px-5 py-2.5 rounded-lg bg-blue-600 text-white hover:bg-blue-700 transition-colors font-medium shadow-sm"
              >
                Mark as Read <i class="fas fa-check ml-2"></i>
              </button>
              <button
                id="next-btn"
                class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors font-medium invisible"
              >
                Next<i class="fas fa-arrow-right ml-2"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Simulator Tab -->
        <div id="simulator-tab" class="tab-content hidden p-6 h-full flex flex-col">
          <div
            class="bg-gray-900 rounded-xl shadow-sm border border-gray-800 flex-1 flex flex-col overflow-hidden text-green-400 font-mono text-sm"
          >
            <div class="bg-gray-800 px-4 py-2 border-b border-gray-700 flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-red-500"></div>
              <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
              <div class="w-3 h-3 rounded-full bg-green-500"></div>
              <span class="ml-4 text-gray-400 text-xs">docker@academy:~</span>
            </div>
            <div id="terminal-output" class="flex-1 p-4 overflow-y-auto space-y-1">
              <div>Welcome to the Docker & K8s CLI Simulator.</div>
              <div>Type <code>help</code> to see available commands.</div>
            </div>
            <div class="p-4 bg-gray-900 flex items-center gap-2 border-t border-gray-800">
              <span class="text-blue-400">$</span>
              <input
                type="text"
                id="terminal-input"
                class="bg-transparent border-none outline-none flex-1 text-green-400"
                autocomplete="off"
                spellcheck="false"
                autofocus
              />
            </div>
          </div>
        </div>

        <!-- Quiz Tab -->
        <div id="quiz-tab" class="tab-content hidden p-6 md:p-10 max-w-3xl mx-auto w-full">
          <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Quiz System</h2>
            <p class="text-gray-500">Coming soon for Docker & K8s topics!</p>
          </div>
        </div>
      </div>
    </main>

    <script src="docker-kubernetes-academy.js"></script>
  </body>
</html>
