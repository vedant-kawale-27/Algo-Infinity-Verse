<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RL Grid World</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 Reinforcement Learning Grid World</h1>
      <p>Q-Learning demonstration</p>
    </header>

    <div class="controls">
      <button id="trainBtn">▶️ Train</button>
      <button id="resetBtn">🔄 Reset</button>
      <button id="stepBtn">⏭️ Step</button>
      <button id="speedBtn">⏱️ Speed: Normal</button>
      <span id="episodeInfo">Episode: 0</span>
      <span id="stepsInfo">Steps: 0</span>
    </div>

    <div class="main-layout">
      <div class="grid-container">
        <canvas id="gridCanvas" width="400" height="400" role="img" aria-label="Grid World Environment">
          Your browser does not support or has disabled the canvas element.
        </canvas>
        <div class="legend">
          <span>🟩 Start</span>
          <span>⭐ Goal</span>
          <span>⬛ Wall</span>
          <span>👤 Agent</span>
        </div>
      </div>

      <div class="q-table-container">
        <h3>📊 Q-Table</h3>
        <div id="qTable"></div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <span class="stat-label">Reward</span>
        <span class="stat-value" id="rewardDisplay">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Epsilon</span>
        <span class="stat-value" id="epsilonDisplay">1.00</span>
      </div>
      <div class="stat">
        <span class="stat-label">Q-Table Size</span>
        <span class="stat-value" id="qSizeDisplay">0</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
