<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DNS Resolution Visualizer | Algo Infinity Verse</title>
    <meta
      name="description"
      content="Visualize the complete DNS lookup process from browser cache through recursive resolver, root server, TLD server, and authoritative name server."
    />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="dns-simulator.css" />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="/theme.js"></script>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <div class="container">
      <header class="header">
        <h1>DNS Resolution Simulator</h1>
        <p>Understand the recursive lookup process of the Domain Name System</p>
      </header>

      <main class="simulator-layout">
        <aside class="controls-panel">
          <div class="control-group">
            <label for="domain-input">Domain Name</label>
            <input
              type="text"
              id="domain-input"
              value="algo-infinity.com"
              placeholder="e.g. example.com"
            />
          </div>
          <div class="control-group">
            <label class="toggle-container">
              <input type="checkbox" id="cache-toggle" role="switch" />
              <span class="toggle-slider"></span>
              Enable DNS Caching
            </label>
          </div>
          <div class="button-group">
            <button id="resolve-btn" class="primary-btn">Resolve Domain</button>
            <button id="reset-btn" class="secondary-btn">Reset</button>
          </div>

          <div class="logs-container">
            <h3>Query Logs</h3>
            <div id="logs-area" class="logs-area" aria-live="polite"></div>
          </div>
        </aside>

        <section class="visualization-panel">
          <div class="network-canvas" id="network-canvas">
            <div class="node browser-node" id="node-browser" style="top: 50%; left: 10%">
              <i class="fa-solid fa-laptop" aria-hidden="true"></i>
              <span>Browser</span>
            </div>
            <div class="node resolver-node" id="node-resolver" style="top: 50%; left: 40%">
              <i class="fa-solid fa-server" aria-hidden="true"></i>
              <span>Recursive<br />Resolver (ISP)</span>
            </div>
            <div class="node root-node" id="node-root" style="top: 15%; left: 80%">
              <i class="fa-solid fa-globe" aria-hidden="true"></i>
              <span>Root Server (.)</span>
            </div>
            <div class="node tld-node" id="node-tld" style="top: 50%; left: 80%">
              <i class="fa-solid fa-sitemap" aria-hidden="true"></i>
              <span>TLD Server (.com)</span>
            </div>
            <div class="node auth-node" id="node-auth" style="top: 85%; left: 80%">
              <i class="fa-solid fa-database" aria-hidden="true"></i>
              <span>Authoritative<br />Server</span>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="footer-placeholder"></div>

    <script src="/bootstrap-legacy.js"></script>
    <script src="/script.js"></script>
    <script src="/auth.js"></script>
    <script src="dns-simulator.js"></script>
    <script>
      if (typeof loadPartial === 'function') {
        loadPartial('navbar-placeholder', '/partials/navbar.html');
        loadPartial('footer-placeholder', '/partials/footer.html');
      }
    </script>
  </body>
</html>
