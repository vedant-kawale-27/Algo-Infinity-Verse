<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQLite Academy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- sql.js (SQLite for WebAssembly) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="sqlite-academy.css">
  <link rel="stylesheet" href="/styles/eli5-toggle.css">
    <link rel="stylesheet" href="/styles/copy-code.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

    <!-- Mobile Sidebar Toggle -->
    <button id="mobile-menu-btn" class="md:hidden fixed top-4 right-4 z-50 p-2 bg-blue-600 text-white rounded shadow-lg">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="w-72 bg-white border-r border-gray-200 h-full flex flex-col transition-transform duration-300 absolute md:relative z-40 -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-200 bg-blue-50 flex items-center gap-3">
            <i class="fas fa-database text-blue-600 text-2xl"></i>
            <h1 class="font-bold text-lg text-blue-900">SQLite Academy</h1>
        </div>
        
        <!-- Progress Bar -->
        <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between text-xs mb-1 font-semibold text-gray-500">
                <span>Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="sidebar-content" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
            <!-- JS will inject curriculum navigation here -->
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 h-full flex flex-col relative w-full">
        <!-- Tabs Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex space-x-4 shadow-sm z-10 overflow-x-auto">
            <button class="tab-btn active px-4 py-2 font-medium rounded-t-lg border-b-2 border-blue-600 text-blue-600 transition-colors whitespace-nowrap" data-tab="lesson">
                <i class="fas fa-book-open mr-2"></i>Lesson Viewer
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-blue-600 transition-colors whitespace-nowrap" data-tab="simulator">
                <i class="fas fa-play-circle mr-2"></i>SQLite Playground
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-blue-600 transition-colors whitespace-nowrap" data-tab="quiz">
                <i class="fas fa-tasks mr-2"></i>Quiz
            </button>
        </header>

        <!-- Tab Contents -->
        <div class="flex-1 overflow-y-auto relative bg-gray-50 custom-scrollbar">
            <!-- Lesson Tab -->
            <div id="lesson-tab" class="tab-pane absolute inset-0 p-4 md:p-8 fade-in block">
                <div id="lesson-content" class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
                    <!-- JS will inject lesson content here -->
                </div>
            </div>

            <!-- Playground Tab -->
            <div id="simulator-tab" class="tab-pane absolute inset-0 hidden fade-in h-full p-4">
                <div class="flex flex-col h-full max-w-5xl mx-auto gap-4">
                    
                    <!-- Top: Query Editor -->
                    <div class="flex flex-col bg-white border border-gray-200 rounded-lg shadow-sm h-1/2 overflow-hidden">
                        <div class="bg-gray-100 px-4 py-2 border-b border-gray-200 flex justify-between items-center">
                            <span class="font-semibold text-gray-700 text-sm"><i class="fas fa-code mr-2 text-blue-500"></i>SQL Query Editor</span>
                            <button id="run-query-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded text-sm font-medium transition-colors shadow-sm disabled:opacity-50" disabled>
                                <i class="fas fa-bolt mr-2"></i>Loading Engine...
                            </button>
                        </div>
                        <textarea id="sql-editor" class="w-full flex-1 p-4 font-mono text-sm bg-gray-900 text-gray-100 focus:outline-none resize-none editor-scrollbar" spellcheck="false" placeholder="-- Write your SQL query here..."></textarea>
                    </div>

                    <!-- Bottom: Results Pane -->
                    <div class="flex flex-col bg-white border border-gray-200 rounded-lg shadow-sm h-1/2 overflow-hidden">
                        <div class="bg-gray-100 px-4 py-2 border-b border-gray-200">
                            <span class="font-semibold text-gray-700 text-sm"><i class="fas fa-table mr-2 text-green-500"></i>Query Results</span>
                        </div>
                        <div id="results-pane" class="flex-1 overflow-auto custom-scrollbar bg-white relative">
                            <!-- JS will inject table or errors here -->
                            <div class="absolute inset-0 flex items-center justify-center text-gray-400 italic">
                                Run a query to see results here.
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>

            <!-- Quiz Tab -->
            <div id="quiz-tab" class="tab-pane absolute inset-0 p-4 md:p-8 hidden fade-in">
                <div id="quiz-content" class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
                    <!-- JS will inject quiz content here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

    <!-- Custom JS -->
      <script src="/modules/eli5-toggle.js"></script>
<script src="sqlite-academy.js"></script>
  <script src="/modules/copy-code.js"></script>
</body>
</html>
