<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Academy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="firebase-academy.css">
  <link rel="stylesheet" href="/styles/eli5-toggle.css">
    <link rel="stylesheet" href="/styles/copy-code.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

    <!-- Mobile Sidebar Toggle -->
    <button id="mobile-menu-btn" class="md:hidden fixed top-4 right-4 z-50 p-2 bg-yellow-500 text-white rounded shadow-lg">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="w-72 bg-white border-r border-gray-200 h-full flex flex-col transition-transform duration-300 absolute md:relative z-40 -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-200 bg-yellow-50 flex items-center gap-3">
            <i class="fas fa-fire text-yellow-500 text-2xl"></i>
            <h1 class="font-bold text-lg text-yellow-900">Firebase Academy</h1>
        </div>
        
        <!-- Progress Bar -->
        <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between text-xs mb-1 font-semibold text-gray-500">
                <span>Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-yellow-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="sidebar-content" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
            <!-- JS will inject curriculum navigation here -->
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 h-full flex flex-col relative w-full">
        <!-- Tabs Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex space-x-4 shadow-sm z-10 overflow-x-auto">
            <button class="tab-btn active px-4 py-2 font-medium rounded-t-lg border-b-2 border-yellow-500 text-yellow-600 transition-colors whitespace-nowrap" data-tab="lesson">
                <i class="fas fa-book-open mr-2"></i>Lesson Viewer
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-yellow-600 transition-colors whitespace-nowrap" data-tab="simulator">
                <i class="fas fa-laptop-code mr-2"></i>Firebase Simulator
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-yellow-600 transition-colors whitespace-nowrap" data-tab="quiz">
                <i class="fas fa-tasks mr-2"></i>Quiz
            </button>
        </header>

        <!-- Tab Contents -->
        <div class="flex-1 overflow-y-auto relative bg-gray-50 custom-scrollbar">
            <!-- Lesson Tab -->
            <div id="lesson-tab" class="tab-pane absolute inset-0 p-4 md:p-8 fade-in block">
                <div id="lesson-content" class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
                    <!-- JS will inject lesson content here -->
                </div>
            </div>

            <!-- Simulator Tab -->
            <div id="simulator-tab" class="tab-pane absolute inset-0 hidden fade-in h-full p-4">
                <div class="flex flex-col lg:flex-row gap-4 h-full max-w-7xl mx-auto">
                    <!-- Left: Code Editor -->
                    <div class="flex-1 flex flex-col bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden h-1/2 lg:h-full lg:w-1/3">
                        <div class="bg-gray-100 px-4 py-2 border-b border-gray-200 flex justify-between items-center">
                            <span class="font-semibold text-gray-700 text-sm"><i class="fab fa-js text-yellow-500 mr-2"></i>app.js</span>
                            <button id="run-code-btn" class="bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-1.5 rounded text-sm font-medium transition-colors shadow-sm">
                                <i class="fas fa-play mr-2"></i>Run Code
                            </button>
                        </div>
                        <textarea id="firebase-editor" class="w-full flex-1 p-4 font-mono text-sm bg-gray-50 text-gray-800 focus:outline-none resize-none editor-scrollbar" spellcheck="false" placeholder="// Write Firebase v9 code here..."></textarea>
                        <!-- Local console for execution errors -->
                        <div id="editor-console" class="bg-red-50 text-red-600 font-mono text-xs p-2 border-t border-gray-200 hidden max-h-32 overflow-auto"></div>
                    </div>

                    <!-- Right: Split UI (App & Console) -->
                    <div class="flex-1 flex flex-col gap-4 h-1/2 lg:h-full lg:w-2/3">
                        
                        <!-- Right Top: App UI (Light Theme) -->
                        <div class="flex-1 bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden flex flex-col min-h-[30%] relative app-ui-container">
                            <div class="bg-gray-100 px-4 py-2 border-b border-gray-200 flex items-center">
                                <div class="flex space-x-1.5 mr-4">
                                    <div class="w-3 h-3 rounded-full bg-red-400"></div>
                                    <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
                                    <div class="w-3 h-3 rounded-full bg-green-400"></div>
                                </div>
                                <span class="font-medium text-gray-500 text-xs">My Awesome Web App</span>
                            </div>
                            <div class="p-6 flex-1 overflow-auto flex flex-col items-center justify-center text-center">
                                <div id="app-ui-state">
                                    <!-- Dynamic App State Injected Here -->
                                    <i class="fas fa-user-circle text-6xl text-gray-300 mb-4"></i>
                                    <h3 class="text-xl font-semibold text-gray-700">Not Logged In</h3>
                                    <p class="text-gray-500 mt-2 text-sm">Run Firebase Auth code to sign in.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Right Bottom: Firestore Console (Dark Theme) -->
                        <div class="flex-[2] bg-[#1e1e1e] border border-gray-800 rounded-lg shadow-sm overflow-hidden flex flex-col">
                            <div class="bg-[#2d2d2d] px-4 py-2 border-b border-gray-700 flex items-center">
                                <i class="fas fa-database text-yellow-500 mr-2"></i>
                                <span class="font-semibold text-gray-200 text-sm">Firestore Database</span>
                            </div>
                            
                            <!-- Firestore 3-column view -->
                            <div class="flex-1 flex overflow-hidden firestore-console">
                                <!-- Collections -->
                                <div class="w-1/3 border-r border-gray-700 flex flex-col">
                                    <div class="p-2 font-semibold text-xs text-gray-400 uppercase tracking-wider border-b border-gray-700">Collections</div>
                                    <div id="fs-collections" class="flex-1 overflow-auto p-2">
                                        <!-- Collections injected here -->
                                    </div>
                                </div>
                                <!-- Documents -->
                                <div class="w-1/3 border-r border-gray-700 flex flex-col bg-[#252526]">
                                    <div class="p-2 font-semibold text-xs text-gray-400 uppercase tracking-wider border-b border-gray-700">Documents</div>
                                    <div id="fs-documents" class="flex-1 overflow-auto p-2">
                                        <!-- Documents injected here -->
                                        <div class="text-gray-500 text-xs italic text-center mt-4">Select a collection</div>
                                    </div>
                                </div>
                                <!-- Fields -->
                                <div class="w-1/3 flex flex-col bg-[#1e1e1e]">
                                    <div class="p-2 font-semibold text-xs text-gray-400 uppercase tracking-wider border-b border-gray-700">Fields</div>
                                    <div id="fs-fields" class="flex-1 overflow-auto p-4 font-mono text-xs">
                                        <!-- Fields injected here -->
                                        <div class="text-gray-500 italic text-center mt-4">Select a document</div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- Quiz Tab -->
            <div id="quiz-tab" class="tab-pane absolute inset-0 p-4 md:p-8 hidden fade-in">
                <div id="quiz-content" class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
                    <!-- JS will inject quiz content here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

    <!-- Custom JS -->
      <script src="/modules/eli5-toggle.js"></script>
<script src="firebase-academy.js"></script>
  <script src="/modules/copy-code.js"></script>
</body>
</html>
