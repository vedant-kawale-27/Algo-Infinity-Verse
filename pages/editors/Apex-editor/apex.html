<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Editor | Algo Infinity Verse</title>
  <link rel="stylesheet" href="apex.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

  <div class="starfield" id="starfield"></div>

  <header class="topbar">
    <div class="brand">
      <i class="fa-solid fa-infinity"></i>
      <div class="brand-text">
        <span class="brand-name">Algo</span>
        <span class="brand-sub">INFINITY VERSE</span>
      </div>
    </div>
    <div class="topbar-right">
      <label class="lang-select-wrap" for="languageSelect">
        <i class="fa-solid fa-cloud"></i>
        <select id="languageSelect" class="lang-select">
          <option value="apex" selected>Apex</option>
          <option value="abap">ABAP</option>
          <option value="cobol">COBOL</option>
          <option value="fortran">Fortran</option>
          <option value="assembly">x86 Assembly</option>
          <option value="matlab">MATLAB</option>
        </select>
      </label>
      <button class="icon-btn" id="themeToggle" title="Toggle theme"><i class="fa-solid fa-moon"></i></button>
    </div>
  </header>

  <main class="editor-shell">

    <aside class="side-panel" id="examplePanel">
      <div class="side-panel-header">
        <i class="fa-solid fa-cube"></i>
        <h2>Sample Class</h2>
      </div>
      <p class="side-panel-hint">Click a template to load it into the editor.</p>
      <div class="example-list" id="classList"></div>

      <div class="side-panel-header trigger-header">
        <i class="fa-solid fa-bolt"></i>
        <h2>Trigger Templates</h2>
      </div>
      <div class="example-list" id="triggerList"></div>

      <div class="side-panel-header snippets-header">
        <i class="fa-solid fa-layer-group"></i>
        <h2>Common Snippets</h2>
      </div>
      <div class="snippet-list" id="snippetList"></div>
    </aside>

    <section class="editor-main">
      <div class="editor-toolbar">
        <div class="file-info">
          <i class="fa-regular fa-file-lines"></i>
          <input id="fileName" class="filename-input" value="HelloWorld.cls" spellcheck="false" aria-label="File name" />
        </div>
        <div class="toolbar-actions">
          <button class="btn btn-ghost" id="loadStarterBtn">
            <i class="fa-solid fa-arrow-rotate-left"></i> Reset to Starter
          </button>
          <label class="btn btn-ghost" for="fileUpload">
            <i class="fa-solid fa-file-arrow-up"></i> Open file
          </label>
          <input type="file" id="fileUpload" accept=".cls,.trigger,.txt" hidden />
          <button class="btn btn-ghost" id="downloadBtn">
            <i class="fa-solid fa-file-arrow-down"></i> Save file
          </button>
          <button class="btn btn-primary" id="runBtn">
            <i class="fa-solid fa-play"></i> Run
          </button>
        </div>
      </div>

      <div class="code-frame">
        <div class="gutter" id="gutter"></div>
        <div class="code-layer-wrap">
          <pre class="highlight-layer" id="highlightLayer" aria-hidden="true"><code id="highlightCode"></code></pre>
          <textarea
            id="codeInput"
            class="code-input"
            spellcheck="false"
            autocapitalize="off"
            autocomplete="off"
            wrap="off"
            aria-label="Apex code editor"
          ></textarea>
        </div>
      </div>

      <div class="output-panel">
        <div class="output-header">
          <span><i class="fa-solid fa-terminal"></i> Debug Log</span>
          <button class="icon-btn small" id="clearOutputBtn" title="Clear output"><i class="fa-solid fa-broom"></i></button>
        </div>
        <pre class="output-body" id="outputBody" aria-live="polite">Press <strong>Run</strong> to simulate executing this Apex code.</pre>
      </div>
    </section>
  </main>

  <footer class="editor-footer">
    <span>Apex Editor · execution is simulated locally, no Salesforce org round trip</span>
    <span class="footer-cursor" id="cursorPos">Ln 1, Col 1</span>
  </footer>

  <script src="apex.js"></script>
</body>
</html>
