<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Academy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="supabase-academy.css">
  <link rel="stylesheet" href="/styles/eli5-toggle.css">
    <link rel="stylesheet" href="/styles/copy-code.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

    <!-- Mobile Sidebar Toggle -->
    <button id="mobile-menu-btn" class="md:hidden fixed top-4 right-4 z-50 p-2 bg-emerald-500 text-white rounded shadow-lg">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="w-72 bg-white border-r border-gray-200 h-full flex flex-col transition-transform duration-300 absolute md:relative z-40 -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-200 bg-emerald-50 flex items-center gap-3">
            <i class="fas fa-database text-emerald-500 text-2xl"></i>
            <h1 class="font-bold text-lg text-emerald-900">Supabase Academy</h1>
        </div>
        
        <!-- Progress Bar -->
        <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between text-xs mb-1 font-semibold text-gray-500">
                <span>Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-emerald-500 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="sidebar-content" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
            <!-- JS will inject curriculum navigation here -->
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 h-full flex flex-col relative w-full">
        <!-- Tabs Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex space-x-4 shadow-sm z-10 overflow-x-auto">
            <button class="tab-btn active px-4 py-2 font-medium rounded-t-lg border-b-2 border-emerald-500 text-emerald-600 transition-colors whitespace-nowrap" data-tab="lesson">
                <i class="fas fa-book-open mr-2"></i>Lesson Viewer
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-emerald-600 transition-colors whitespace-nowrap" data-tab="simulator">
                <i class="fas fa-laptop-code mr-2"></i>Supabase Studio Simulator
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-emerald-600 transition-colors whitespace-nowrap" data-tab="quiz">
                <i class="fas fa-tasks mr-2"></i>Quiz
            </button>
        </header>

        <!-- Tab Contents -->
        <div class="flex-1 overflow-y-auto relative bg-gray-50 custom-scrollbar">
            <!-- Lesson Tab -->
            <div id="lesson-tab" class="tab-pane absolute inset-0 p-4 md:p-8 fade-in block">
                <div id="lesson-content" class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
                    <!-- JS will inject lesson content here -->
                </div>
            </div>

            <!-- Simulator Tab -->
            <div id="simulator-tab" class="tab-pane absolute inset-0 hidden fade-in h-full p-4">
                <div class="flex flex-col lg:flex-row gap-4 h-full max-w-7xl mx-auto">
                    <!-- Left: Code Editor -->
                    <div class="flex-1 flex flex-col bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden h-1/2 lg:h-full lg:w-1/3">
                        <div class="bg-gray-100 px-4 py-2 border-b border-gray-200 flex justify-between items-center">
                            <span class="font-semibold text-gray-700 text-sm"><i class="fab fa-js text-emerald-500 mr-2"></i>app.js</span>
                            <button id="run-code-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-1.5 rounded text-sm font-medium transition-colors shadow-sm">
                                <i class="fas fa-play mr-2"></i>Run Code
                            </button>
                        </div>
                        <textarea id="supabase-editor" class="w-full flex-1 p-4 font-mono text-sm bg-gray-50 text-gray-800 focus:outline-none resize-none editor-scrollbar" spellcheck="false" placeholder="// Write Supabase JS code here..."></textarea>
                        <!-- Local console for execution errors -->
                        <div id="editor-console" class="bg-gray-900 text-gray-300 font-mono text-xs p-3 border-t border-gray-700 hidden max-h-40 overflow-auto"></div>
                    </div>

                    <!-- Right: Supabase Studio Mock UI (Dark Theme) -->
                    <div class="flex-1 flex flex-col bg-[#1c1c1c] border border-gray-700 rounded-lg shadow-sm overflow-hidden h-1/2 lg:h-full lg:w-2/3 supabase-studio-ui">
                        
                        <!-- Studio Header -->
                        <div class="bg-[#2a2a2a] px-4 py-3 border-b border-gray-700 flex justify-between items-center">
                            <div class="flex items-center text-gray-200">
                                <i class="fas fa-table text-emerald-500 mr-2"></i>
                                <span class="font-semibold text-sm">Table Editor: </span>
                                <select id="table-selector" class="bg-[#1c1c1c] border border-gray-600 text-gray-200 text-xs rounded ml-2 px-2 py-1 outline-none">
                                    <option value="todos">todos</option>
                                    <option value="users">users</option>
                                </select>
                            </div>
                            <!-- Auth Status Indicator -->
                            <div id="auth-status" class="flex items-center text-xs bg-[#1c1c1c] px-3 py-1 rounded-full border border-gray-700 text-gray-400">
                                <div class="w-2 h-2 rounded-full bg-gray-500 mr-2 status-dot"></div>
                                <span class="status-text">Anonymous</span>
                            </div>
                        </div>

                        <!-- Studio Grid Area -->
                        <div class="flex-1 flex flex-col bg-[#141414] overflow-hidden relative table-editor-container">
                            <!-- Table Header -->
                            <div id="grid-header" class="flex bg-[#232323] border-b border-gray-700 text-gray-400 text-xs font-semibold select-none">
                                <!-- Headers injected via JS -->
                            </div>
                            <!-- Table Body -->
                            <div id="grid-body" class="flex-1 overflow-auto custom-scrollbar relative">
                                <!-- Rows injected via JS -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quiz Tab -->
            <div id="quiz-tab" class="tab-pane absolute inset-0 p-4 md:p-8 hidden fade-in">
                <div id="quiz-content" class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
                    <!-- JS will inject quiz content here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

    <!-- Custom JS -->
      <script src="/modules/eli5-toggle.js"></script>
<script src="supabase-academy.js"></script>
  <script src="/modules/copy-code.js"></script>
</body>
</html>
