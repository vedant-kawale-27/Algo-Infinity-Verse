<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Learning Hub</title>
    <!-- Tailwind CSS via CDN for Hub Interface -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="fastapi-learning.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/styles/eli5-toggle.css">
    <link rel="stylesheet" href="/styles/copy-code.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

    <!-- Mobile Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-72 bg-white shadow-xl transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 flex flex-col border-r border-gray-200">
        <div class="p-5 border-b flex justify-between items-center bg-[#059669] text-white">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-bolt"></i> FastAPI Hub
            </h1>
            <button id="close-sidebar" class="lg:hidden text-green-100 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        
        <!-- Progress Bar -->
        <div class="p-5 border-b bg-gray-50">
            <div class="flex justify-between text-sm mb-1 font-semibold text-gray-700">
                <span>Course Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="progress-bar" class="bg-[#059669] h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4">
            <ul id="module-list" class="space-y-2">
                <!-- Dynamically injected sidebar items go here -->
            </ul>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Header -->
        <header class="bg-white shadow-sm border-b p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="open-sidebar" class="lg:hidden text-gray-600 hover:text-gray-900">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h2 id="active-module-title" class="text-lg md:text-xl font-bold text-gray-800">Module Title</h2>
            </div>
            
            <!-- Tabs Navigation -->
            <nav class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
                <button data-tab="lesson" class="tab-btn active px-3 py-2 md:px-4 text-sm font-medium rounded-md text-gray-700 hover:text-[#059669] transition-colors">
                    <i class="fa-solid fa-book-open mr-1"></i> <span class="hidden sm:inline">Lesson Viewer</span>
                </button>
                <button data-tab="simulator" class="tab-btn px-3 py-2 md:px-4 text-sm font-medium rounded-md text-gray-700 hover:text-[#059669] transition-colors">
                    <i class="fa-solid fa-code mr-1"></i> <span class="hidden sm:inline">Interactive Docs (Simulator)</span>
                </button>
                <button data-tab="quiz" class="tab-btn px-3 py-2 md:px-4 text-sm font-medium rounded-md text-gray-700 hover:text-[#059669] transition-colors">
                    <i class="fa-solid fa-list-check mr-1"></i> <span class="hidden sm:inline">Quiz</span>
                </button>
            </nav>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-hidden bg-gray-50 p-4 md:p-6 relative">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 w-full h-full overflow-hidden relative">
                
                <!-- Lesson Viewer Wrapper -->
                <div id="tab-lesson" class="tab-content h-full overflow-y-auto p-6 md:p-10 active">
                    <!-- Dynamically injected lesson text -->
                </div>

                <!-- API Simulator Wrapper -->
                <div id="tab-simulator" class="tab-content h-full hidden flex-col lg:flex-row">
                    
                    <!-- Left: Python Code Editor -->
                    <div class="w-full lg:w-1/2 h-1/2 lg:h-full flex flex-col border-b lg:border-b-0 lg:border-r border-gray-300">
                        <div class="bg-gray-800 text-gray-200 text-xs py-2 px-4 flex justify-between items-center font-mono border-b border-gray-700">
                            <span>main.py (FastAPI)</span>
                            <button id="run-server-btn" class="bg-[#059669] hover:bg-green-600 text-white px-3 py-1 rounded shadow text-xs font-sans transition-colors font-semibold">
                                <i class="fa-solid fa-play mr-1"></i> Refresh Docs
                            </button>
                        </div>
                        <textarea id="code-editor" class="flex-1 w-full bg-[#1e1e1e] text-[#d4d4d4] p-4 focus:outline-none" spellcheck="false"></textarea>
                    </div>
                    
                    <!-- Right: Fake Swagger UI -->
                    <div class="w-full lg:w-1/2 h-1/2 lg:h-full flex flex-col bg-white overflow-y-auto relative swagger-container" id="swagger-ui-container">
                        <!-- Swagger UI Header -->
                        <div class="p-6 border-b border-gray-200">
                            <h2 class="text-3xl font-bold text-gray-800 flex items-center">
                                FastAPI 
                                <span class="ml-3 text-xs bg-gray-500 text-white rounded-full px-2 py-1 align-middle relative -top-1">0.1.0</span>
                            </h2>
                            <p class="text-gray-600 mt-2 text-sm"><a href="#" class="text-blue-500 hover:underline">/openapi.json</a></p>
                        </div>
                        
                        <div id="swagger-endpoints" class="p-4 md:p-6 space-y-4">
                            <!-- Dynamically injected Swagger blocks go here -->
                            <div class="text-center text-gray-500 mt-10">
                                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i>
                                <p>Click "Refresh Docs" to parse your Python code.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quiz Interface Wrapper -->
                <div id="tab-quiz" class="tab-content h-full overflow-y-auto p-6 md:p-10 hidden">
                    <!-- Dynamically injected quiz UI -->
                </div>

            </div>
        </div>
    </main>

      <script src="/modules/eli5-toggle.js"></script>
<script src="fastapi-learning.js"></script>
  <script src="/modules/copy-code.js"></script>
</body>
</html>
