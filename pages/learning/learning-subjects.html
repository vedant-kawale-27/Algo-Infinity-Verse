<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learn Core CS — Algo Infinity Verse</title>
  <meta name="description" content="Master core computer science theory — DBMS, OS, Computer Architecture, OOP, SQL, Power BI, System Design, API Design, and Cache Systems." />

  <link rel="stylesheet" href="/styles.css" />
  <link rel="stylesheet" href="learning-subjects.css" />

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script>
    (function() {
      try {
        var t = localStorage.getItem('theme');
        var p = window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = t || (p ? 'light' : 'dark');
        if (theme === 'light') document.documentElement.classList.add('light-mode');
      } catch (e) {}
    })();
  </script>
</head>
<body data-page="learning-subjects" data-no-loading>
  <div id="loading-screen" class="hidden">
    <div class="loader">
      <div class="infinity-loader">∞</div>
      <h2>Loading Core CS...</h2>
    </div>
  </div>

  <main>
    <!-- HERO -->
    <section class="lcs-hero">
      <div class="lcs-hero-bg">
        <div class="lcs-hero-glow"></div>
        <div class="lcs-hero-orb" aria-hidden="true"></div>
      </div>

      <a href="/" class="lcs-back-btn" id="lcsBackBtn" aria-label="Go back to home">
        <i class="fas fa-arrow-left"></i>
        <span>Back</span>
      </a>

      <div class="lcs-hero-content">
        <h1 class="lcs-hero-title" id="lcsHeroTitle">
          <span class="lcs-title-word"><span class="lcs-title-char">L</span><span class="lcs-title-char">e</span><span class="lcs-title-char">a</span><span class="lcs-title-char">r</span><span class="lcs-title-char">n</span></span>
          <span class="lcs-title-space"></span>
          <span class="lcs-title-word"><span class="lcs-title-char">C</span><span class="lcs-title-char">o</span><span class="lcs-title-char">r</span><span class="lcs-title-char">e</span></span>
          <span class="lcs-title-space"></span>
          <span class="lcs-title-word"><span class="lcs-title-char">C</span><span class="lcs-title-char">S</span></span>
          <span class="lcs-title-space"></span>
          <span class="lcs-title-word"><span class="lcs-title-char">S</span><span class="lcs-title-char">u</span><span class="lcs-title-char">b</span><span class="lcs-title-char">j</span><span class="lcs-title-char">e</span><span class="lcs-title-char">c</span><span class="lcs-title-char">t</span><span class="lcs-title-char">s</span></span>
        </h1>
        <p class="lcs-hero-subtitle">
          Foundational computer science theory — from databases and operating systems to system design and caching. Pick a subject and start learning.
        </p>

        <!-- SEARCH -->
        <div class="lcs-search-wrapper">
          <div class="lcs-search">
            <i class="fas fa-search lcs-search-icon"></i>
            <input
              type="text"
              id="lcsSearchInput"
              class="lcs-search-input"
              placeholder="Search subjects..."
              aria-label="Search CS subjects"
              autocomplete="off"
            />
            <button type="button" id="lcsClearBtn" class="lcs-clear-btn" aria-label="Clear search">
              <i class="fas fa-times"></i>
            </button>
            <span class="lcs-search-hint">⌘K</span>
          </div>
        </div>

        <!-- FILTER CHIPS: Category -->
        <div class="lcs-filters" id="lcsCategoryFilters" role="tablist" aria-label="Subject categories">
          <span class="lcs-filter-label">Category</span>
          <div class="lcs-filter-chips" id="lcsCategoryChips"></div>
        </div>

        <!-- FILTER CHIPS: Difficulty -->
        <div class="lcs-filters" id="lcsDifficultyFilters" role="tablist" aria-label="Difficulty level">
          <span class="lcs-filter-label">Level</span>
          <div class="lcs-filter-chips" id="lcsDifficultyChips"></div>
        </div>

        <p class="lcs-result-count" id="lcsResultCount">Showing <span id="lcsCountDisplay">0</span> subjects</p>
      </div>

    </section>

    <!-- CARD GRID -->
    <section class="lcs-section">
      <div class="lcs-container">
        <div class="lcs-grid" id="lcsGrid" role="list">
          <!-- Cards rendered by JS -->
        </div>
        <div class="lcs-empty" id="lcsEmpty" style="display:none;">
          <i class="fas fa-search-minus"></i>
          <h3>No subjects found</h3>
          <p>Try adjusting your search or filter.</p>
          <button type="button" class="lcs-empty-reset" id="lcsResetBtn">Reset filters</button>
        </div>
      </div>
    </section>
  </main>

  <script src="/auth.js"></script>
  <script src="/theme.js"></script>
  <script src="/script.js"></script>
  <script src="learning-subjects.js"></script>
</body>
</html>
