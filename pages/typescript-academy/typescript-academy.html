<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript Academy - Algo Infinity Verse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="typescript-academy.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/styles/eli5-toggle.css">
    <script src="https://cdn.jsdelivr.net/npm/typescript@5.3.3/lib/typescript.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 h-screen flex overflow-hidden" style="font-family: 'Inter', system-ui, sans-serif;">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-30 w-72 bg-white shadow-xl transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 flex flex-col border-r border-gray-200">
        <div class="p-5 border-b flex justify-between items-center bg-blue-600 text-white shadow-sm">
            <h1 class="text-lg font-bold flex items-center gap-2.5" style="font-family: 'DM Sans', sans-serif; letter-spacing: -0.02em;">
                <svg viewBox="0 0 24 24" fill="currentColor" width="1.25em" height="1.25em"><path d="M2 0h20v20H2zm17.09 15.54c-.18-.49-.54-.91-1.2-1.16-.66-.25-1.46-.32-2.46-.27.84.19 1.38.56 1.65 1.05.4.72.28 1.95-.37 2.62-.42.43-1.07.67-1.97.66-.87-.01-1.58-.3-2.14-.83.05.1.08.16.12.23.46.62 1.22 1 2.16 1.05.97.06 2.01-.19 2.58-.77.6-.6.75-1.61.52-2.46zM4.77 14.14c.1.11.18.2.27.3.38.43.59.92.48 1.5-.14.76-.73 1.2-1.5 1.17-.62-.02-1.1-.28-1.42-.74l-.17-.24-.03-.01.1-.2.09-.18c.38.5.85.74 1.42.7.54-.04.86-.4.9-.86.05-.55-.2-.85-.66-1.1-.13-.07-.26-.15-.39-.23-.07-.04-.14-.09-.2-.13-.43-.28-.7-.66-.7-1.14 0-.68.52-1.24 1.2-1.27.53-.02.97.19 1.27.57l.1.13-.06.06-.12.1-.11.1-.06-.05c-.24-.28-.53-.44-.93-.42-.44.02-.73.35-.73.71-.01.37.18.57.55.76l.17.11z"/></svg>
                TypeScript Academy
            </h1>
            <button id="close-sidebar" class="lg:hidden text-white/70 hover:text-white transition-colors">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>

        <div class="px-5 py-4 border-b bg-blue-50/20">
            <div class="flex justify-between text-[11px] mb-2 font-semibold text-slate-500 uppercase tracking-wider" style="font-family: 'Inter', sans-serif;">
                <span>Course Progress</span>
                <span id="progress-text" class="text-blue-600">0%</span>
            </div>
            <div class="w-full bg-gray-200/70 rounded-full h-1.5">
                <div id="progress-bar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto py-3">
            <ul id="module-list" class="relative">
            </ul>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <header class="bg-white shadow-sm border-b p-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button id="open-sidebar" class="lg:hidden text-gray-600 hover:text-blue-600 transition-colors">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h2 id="active-module-title" class="text-lg md:text-xl font-bold text-slate-800" style="font-family: 'DM Sans', sans-serif; letter-spacing: -0.02em;">Module Title</h2>
            </div>
            <nav class="flex space-x-1 bg-gray-100 p-1 rounded-lg" style="font-family: 'Inter', sans-serif;">
                <button data-tab="lesson" class="tab-btn active px-3 py-2 md:px-4 text-xs md:text-sm font-semibold rounded-md text-gray-700 hover:text-blue-600 transition-colors">
                    <i class="fa-solid fa-book-open mr-1"></i> <span class="hidden sm:inline">Lesson Viewer</span>
                </button>
                <button data-tab="playground" class="tab-btn px-3 py-2 md:px-4 text-xs md:text-sm font-semibold rounded-md text-gray-700 hover:text-blue-600 transition-colors">
                    <i class="fa-solid fa-code mr-1"></i> <span class="hidden sm:inline">Playground & Code</span>
                </button>
                <button data-tab="quiz" class="tab-btn px-3 py-2 md:px-4 text-xs md:text-sm font-semibold rounded-md text-gray-700 hover:text-blue-600 transition-colors">
                    <i class="fa-solid fa-list-check mr-1"></i> <span class="hidden sm:inline">Quiz</span>
                </button>
            </nav>
        </header>

        <div class="flex-1 overflow-hidden bg-gray-50 p-4 md:p-6 relative">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 w-full h-full overflow-hidden relative">

                <div id="tab-lesson" class="tab-content h-full overflow-y-auto p-6 md:p-10 active">
                </div>

                <div id="tab-playground" class="tab-content h-full hidden flex-col md:flex-row bg-gray-50">
                    <div class="w-full md:w-1/2 h-1/2 md:h-full flex flex-col border-b md:border-b-0 md:border-r border-gray-300">
                        <div class="bg-gray-800 text-gray-200 text-xs py-2 px-4 flex justify-between items-center font-mono border-b border-gray-700">
                            <span class="flex items-center gap-1.5"><svg viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em" class="text-blue-400"><path d="M2 0h20v20H2zm17.09 15.54c-.18-.49-.54-.91-1.2-1.16-.66-.25-1.46-.32-2.46-.27.84.19 1.38.56 1.65 1.05.4.72.28 1.95-.37 2.62-.42.43-1.07.67-1.97.66-.87-.01-1.58-.3-2.14-.83.05.1.08.16.12.23.46.62 1.22 1 2.16 1.05.97.06 2.01-.19 2.58-.77.6-.6.75-1.61.52-2.46zM4.77 14.14c.1.11.18.2.27.3.38.43.59.92.48 1.5-.14.76-.73 1.2-1.5 1.17-.62-.02-1.1-.28-1.42-.74l-.17-.24-.03-.01.1-.2.09-.18c.38.5.85.74 1.42.7.54-.04.86-.4.9-.86.05-.55-.2-.85-.66-1.1-.13-.07-.26-.15-.39-.23-.07-.04-.14-.09-.2-.13-.43-.28-.7-.66-.7-1.14 0-.68.52-1.24 1.2-1.27.53-.02.97.19 1.27.57l.1.13-.06.06-.12.1-.11.1-.06-.05c-.24-.28-.53-.44-.93-.42-.44.02-.73.35-.73.71-.01.37.18.57.55.76l.17.11z"/></svg> index.ts</span>
                            <button id="run-code-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 rounded shadow-sm text-xs font-sans transition-colors font-bold flex items-center gap-1">
                                <i class="fa-solid fa-play"></i> Run Code
                            </button>
                        </div>
                        <textarea id="code-editor" class="flex-1 w-full bg-[#1a1a1a] text-[#f5f5f5] p-4 focus:outline-none font-mono" spellcheck="false"></textarea>
                    </div>

                    <div class="w-full md:w-1/2 h-1/2 md:h-full flex flex-col bg-white">
                        <div class="bg-gray-100 text-gray-600 text-xs py-2 px-4 border-b border-gray-200 flex items-center font-sans">
                            <div class="flex space-x-1.5 mr-3">
                                <div class="w-2.5 h-2.5 rounded-full bg-red-400"></div>
                                <div class="w-2.5 h-2.5 rounded-full bg-yellow-400"></div>
                                <div class="w-2.5 h-2.5 rounded-full bg-green-400"></div>
                            </div>
                            <div class="bg-white px-3 py-0.5 rounded border text-[10px] flex-1 text-center text-gray-400 mx-2 shadow-inner">
                                <i class="fa-solid fa-lock text-gray-300 mr-1"></i> TypeScript Playground
                            </div>
                        </div>
                        <iframe id="preview-frame" class="flex-1 w-full border-none" sandbox="allow-scripts allow-popups allow-modals"></iframe>
                    </div>
                </div>

                <div id="tab-quiz" class="tab-content h-full overflow-y-auto p-6 md:p-10 hidden">
                </div>

            </div>
        </div>
    </main>

      <script src="/modules/eli5-toggle.js"></script>
<script src="typescript-academy.js"></script>
</body>
</html>
