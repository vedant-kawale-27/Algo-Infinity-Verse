<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Algo Infinity Verse</title>
    <link rel="stylesheet" href="/styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body data-page="login">
    <div id="navbar-placeholder"></div>

    <main class="auth-page">
      <section class="auth-panel glass-card">
        <div class="auth-brand">
          <span class="auth-mark">∞</span>
          <h1>Welcome Back</h1>
          <p>Log in to continue your DSA journey.</p>
        </div>

        <form class="auth-form" data-auth-form="login" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="auth-password-field">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="password-toggle auth-password-toggle"
                data-target="password"
                aria-label="Show password"
                aria-pressed="false"
                aria-controls="password"
              >
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
          <p class="auth-message" data-auth-message aria-live="polite"></p>
          <button class="btn btn-primary auth-submit" type="submit">
            <i class="fas fa-right-to-bracket"></i>
            <span>Log In</span>
          </button>
        </form>

        <p class="auth-switch">
          New here?
          <a href="/signup">Create an account</a>
        </p>
      </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="/auth.js"></script>
    <script src="/script.js"></script>
    <script>
      loadPartial('navbar-placeholder', '/partials/navbar.html');
      loadPartial('footer-placeholder', '/partials/footer.html');
    </script>
  </body>
</html>
