<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB Academy</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="/styles/eli5-toggle.css">
    <link rel="stylesheet" href="/styles/copy-code.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

    <!-- Mobile Sidebar Toggle -->
    <button id="mobile-menu-btn" class="md:hidden fixed top-4 right-4 z-50 p-2 bg-green-600 text-white rounded shadow-lg">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="w-72 bg-white border-r border-gray-200 h-full flex flex-col transition-transform duration-300 absolute md:relative z-40 -translate-x-full md:translate-x-0">
        <div class="p-4 border-b border-gray-200 bg-green-50 flex items-center gap-3">
            <i class="fas fa-leaf text-green-600 text-2xl"></i>
            <h1 class="font-bold text-lg text-green-900">MongoDB Academy</h1>
        </div>
        
        <!-- Progress Bar -->
        <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between text-xs mb-1 font-semibold text-gray-500">
                <span>Progress</span>
                <span id="progress-text">0%</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progress-bar" class="bg-green-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="sidebar-content" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
            <!-- JS will inject curriculum navigation here -->
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 h-full flex flex-col relative w-full">
        <!-- Tabs Header -->
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex space-x-4 shadow-sm z-10 overflow-x-auto">
            <button class="tab-btn active px-4 py-2 font-medium rounded-t-lg border-b-2 border-green-600 text-green-600 transition-colors whitespace-nowrap" data-tab="lesson">
                <i class="fas fa-book-open mr-2"></i>Lesson Viewer
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-green-600 transition-colors whitespace-nowrap" data-tab="simulator">
                <i class="fas fa-terminal mr-2"></i>Mongo Shell Simulator
            </button>
            <button class="tab-btn px-4 py-2 font-medium text-gray-500 hover:text-green-600 transition-colors whitespace-nowrap" data-tab="quiz">
                <i class="fas fa-tasks mr-2"></i>Quiz
            </button>
        </header>

        <!-- Tab Contents -->
        <div class="flex-1 overflow-y-auto relative bg-gray-50 custom-scrollbar">
            <!-- Lesson Tab -->
            <div id="lesson-tab" class="tab-pane absolute inset-0 p-4 md:p-8 fade-in block">
                <div id="lesson-content" class="max-w-3xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
                    <!-- JS will inject lesson content here -->
                </div>
            </div>

            <!-- Simulator Tab -->
            <div id="simulator-tab" class="tab-pane absolute inset-0 hidden fade-in h-full p-4">
                <div class="flex flex-col lg:flex-row gap-4 h-full max-w-7xl mx-auto">
                    <!-- Left: Editor -->
                    <div class="flex-1 flex flex-col bg-white border border-gray-200 rounded-lg shadow-sm overflow-hidden h-1/2 lg:h-full">
                        <div class="bg-gray-100 px-4 py-2 border-b border-gray-200 flex justify-between items-center">
                            <span class="font-semibold text-gray-700 text-sm"><i class="fas fa-code mr-2"></i>Query Editor</span>
                            <button id="run-query-btn" class="bg-green-600 hover:bg-green-700 text-white px-4 py-1.5 rounded text-sm font-medium transition-colors shadow-sm">
                                <i class="fas fa-play mr-2"></i>Run Query
                            </button>
                        </div>
                        <textarea id="mongo-editor" class="w-full flex-1 p-4 font-mono text-sm bg-gray-50 text-gray-800 focus:outline-none resize-none editor-scrollbar" spellcheck="false" placeholder="db.collection.find({})"></textarea>
                    </div>

                    <!-- Right: Terminal -->
                    <div class="flex-1 flex flex-col bg-gray-900 border border-gray-800 rounded-lg shadow-sm overflow-hidden h-1/2 lg:h-full">
                        <div class="bg-gray-800 px-4 py-2 border-b border-gray-700">
                            <span class="font-semibold text-gray-300 text-sm"><i class="fas fa-terminal mr-2"></i>MongoDB Shell output</span>
                        </div>
                        <div id="terminal-content" class="mongo-terminal custom-scrollbar">
                            <div class="text-green-500 mb-2">MongoDB shell version v6.0.0</div>
                            <div class="text-green-500 mb-2">connecting to: mongodb://127.0.0.1:27017/academy</div>
                            <div class="text-green-500 mb-4">Implicit session: session { "id" : UUID("...") }</div>
                            <div id="results-pane"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quiz Tab -->
            <div id="quiz-tab" class="tab-pane absolute inset-0 p-4 md:p-8 hidden fade-in">
                <div id="quiz-content" class="max-w-2xl mx-auto bg-white p-6 md:p-8 rounded-xl shadow-sm border border-gray-100">
                    <!-- JS will inject quiz content here -->
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

    <!-- Custom JS -->
      <script src="/modules/eli5-toggle.js"></script>
<script src="script.js"></script>
  <script src="/modules/copy-code.js"></script>
</body>
</html>
